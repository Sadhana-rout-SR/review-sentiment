<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Sentiment AI Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/script.js" defer></script>
</head>
<body>
    <main class="container">
        <header class="hero">
            <h1>Review Sentiment AI</h1>
            <p>Collect reviews from Google or social sources and generate sentiment analytics.</p>
        </header>

        <section class="panel input-panel">
            <h2>Analyze Reviews</h2>
            <form id="analyzeForm">
                <div class="grid-2">
                    <label>
                        Source
                        <select id="source" required>
                            <option value="google">Google Reviews</option>
                            <option value="reddit">Social (Reddit)</option>
                            <option value="csv">Dataset CSV</option>
                            <option value="manual">Manual Input</option>
                        </select>
                    </label>
                    <label>
                        Max Reviews
                        <input id="maxReviews" type="number" min="1" max="200" value="50" required>
                    </label>
                </div>

                <label id="queryLabel">
                    Business/Brand Query
                    <input id="query" type="text" placeholder="e.g. Starbucks New York">
                </label>

                <label id="manualLabel" class="hidden">
                    Manual Reviews (one review per line)
                    <textarea id="manualText" rows="6" placeholder="I love the service and delivery speed."></textarea>
                </label>

                <button type="submit" id="runBtn">Run Sentiment Analysis</button>
            </form>
            <p id="statusMsg" class="status"></p>
        </section>

        <section id="resultsSection" class="hidden">
            <section class="metrics-grid">
                <article class="metric-card">
                    <h3>Total Reviews</h3>
                    <p id="totalReviews">0</p>
                </article>
                <article class="metric-card positive">
                    <h3>Positive %</h3>
                    <p id="positivePct">0%</p>
                </article>
                <article class="metric-card negative">
                    <h3>Negative %</h3>
                    <p id="negativePct">0%</p>
                </article>
                <article class="metric-card neutral">
                    <h3>Overall Satisfaction</h3>
                    <p id="satisfactionLabel">-</p>
                    <small id="satisfactionScore">Score: 0</small>
                </article>
            </section>

            <section class="charts-grid">
                <article class="panel chart-panel">
                    <h2>Sentiment Distribution</h2>
                    <canvas id="sentimentChart"></canvas>
                </article>
                <article class="panel chart-panel">
                    <h2>Top Keywords</h2>
                    <canvas id="keywordChart"></canvas>
                </article>
            </section>

            <section class="panel keyword-list-panel">
                <h2>Most Common Keywords</h2>
                <ul id="keywordList" class="keyword-list"></ul>
            </section>

            <section class="panel reviews-panel">
                <h2>Analyzed Reviews</h2>
                <div id="reviewTable"></div>
            </section>
        </section>
    </main>
</body>
</html>
